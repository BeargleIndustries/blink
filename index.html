<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blink</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
      }
      :root {
        --bg-primary: #1a1a2e;
        --bg-secondary: #16213e;
        --bg-tertiary: #0f3460;
        --text-primary: #e4e4e4;
        --text-secondary: #a0a0a0;
        --accent: #6c63ff;
        --accent-hover: #5a52d5;
        --success: #4caf50;
        --warning: #ff9800;
        --error: #f44336;
        --border: #2a2a4a;
        --radius: 8px;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg-primary: #f5f5f5;
          --bg-secondary: #ffffff;
          --bg-tertiary: #e8e8e8;
          --text-primary: #1a1a1a;
          --text-secondary: #666666;
          --border: #ddd;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
