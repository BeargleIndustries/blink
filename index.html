<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blink</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
      }
      :root {
        --bg-primary: #0a0a0a;
        --bg-secondary: #0f0f0f;
        --bg-tertiary: #141414;
        --bg-elevated: #1a1a1a;
        --text-primary: #e0e0e0;
        --text-secondary: #999;
        --text-muted: #777;
        --accent: #4a9eff;
        --accent-hover: #6db3ff;
        --accent-bg: rgba(74, 158, 255, 0.1);
        --accent-border: rgba(74, 158, 255, 0.2);
        --selection: rgba(74, 158, 255, 0.25);
        --success: #22c55e;
        --warning: #f59e0b;
        --error: #ef4444;
        --border: #1a1a1a;
        --border-hover: #333;
        --radius: 8px;
        --radius-pill: 100px;
        --transition: 0.2s ease;
      }
      ::selection { background: var(--selection); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
