name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            features: ""
            label: "Windows (CPU)"
          - os: macos-latest
            features: "metal"
            label: "macOS (Metal)"
          - os: ubuntu-22.04
            features: ""
            label: "Linux (CPU)"

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev cmake clang libclang-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Blink ${{ github.ref_name }}"
          releaseBody: "See the [changelog](https://github.com/BeargleIndustries/blink/blob/master/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}
